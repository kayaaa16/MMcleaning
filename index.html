<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寓見青旅，細部清潔安排表</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ━━━━━━━━━━  CSS VARIABLES  ━━━━━━━━━━ */
:root {
  --bg:        #eef1f7;
  --surface:   #ffffff;
  --surf2:     #f6f8fc;
  --surf-sat:  #fdf4ff; /* Saturday tint */
  --surf-sun:  #fff8f0; /* Sunday tint */
  --border:    #dde3ee;
  --border2:   #c8d2e4;
  --bdr-sat:   #e9d5ff;
  --bdr-sun:   #fed7aa;
  --txt:       #1e293b;
  --txt2:      #64748b;
  --txt3:      #a0aec0;
  --blue:      #3b82f6;
  --blue2:     #2563eb;
  --green:     #10b981;
  --red:       #ef4444;
  --amber:     #f59e0b;
  --font:      'Outfit', -apple-system, sans-serif;
  --radius:    10px;
  --shadow:    0 1px 4px rgba(30,41,59,.08), 0 4px 16px rgba(30,41,59,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--txt);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ━━━━━━━━━━  HEADER  ━━━━━━━━━━ */
.main-header {
  height: 28px;
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  box-shadow: 0 1px 3px rgba(30,41,59,.06);
  z-index: 100;
}
.logo {
  font-size: .9rem;
  font-weight: 700;
  color: var(--txt);
  letter-spacing: .3px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.logo::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 1px;
  background: var(--blue);
  box-shadow: 0 0 0 2px rgba(59,130,246,.18);
}

/* ━━━━━━━━━━  TODAY PANEL  ━━━━━━━━━━ */
.today-panel {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 4px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  height: 38px;
}
.today-label {
  flex-shrink: 0;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  background: var(--blue);
  color: #fff;
  border-radius: 6px;
  padding: 3px 10px;
  gap: 5px;
  text-align: center;
}
.today-label .tl-day { font-size: 1.1rem; font-weight: 700; line-height: 1; }
.today-label .tl-mon { font-size: .7rem; letter-spacing: .4px; opacity: .9; }
.today-title { font-size: .78rem; font-weight: 600; color: var(--txt2); flex-shrink: 0; white-space: nowrap; }
.today-chips {
  flex: 1;
  display: flex;
  gap: 7px;
  overflow-x: auto;
  padding-bottom: 2px;
  scrollbar-width: thin;
}
.today-chips::-webkit-scrollbar { height: 3px; }
.today-chips::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.today-chip {
  flex-shrink: 0;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: .78rem;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 5px;
  user-select: none;
}
.today-chip.pending         { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
.today-chip.completed       { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; text-decoration: line-through; opacity: .75; }
.today-chip.overdue         { background: #fff1f2; border-color: #fecdd3; color: #b91c1c; }
.today-chip:hover           { filter: brightness(.95); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
.today-empty { font-size: .8rem; color: var(--txt3); font-style: italic; }

/* ━━━━━━━━━━  MAIN ROW  ━━━━━━━━━━ */
.main-row {
  flex: 1;
  min-height: 0;
  display: flex;
  overflow: hidden;
}

/* ━━━━━━━━━━  SIDEBAR  ━━━━━━━━━━ */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}
/* Sidebar header row */
.sidebar-head {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
}
.sidebar-title {
  font-size: .78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--txt2);
}
.edit-toggle-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--surf2);
  color: var(--txt2);
  font-family: var(--font);
  font-size: .74rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.edit-toggle-btn:hover, .edit-toggle-btn.active {
  border-color: var(--blue);
  background: #eff6ff;
  color: var(--blue);
}
/* Area filter tabs */
.sidebar-filters {
  flex-shrink: 0;
  padding: 8px 14px 5px;
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.area-tab {
  padding: 3px 9px;
  border-radius: 20px;
  font-size: .72rem;
  font-weight: 500;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--surf2);
  color: var(--txt2);
  transition: all .15s;
  white-space: nowrap;
}
.area-tab.active   { background: var(--blue); border-color: var(--blue); color: #fff; }
.area-tab:hover:not(.active) { border-color: var(--border2); color: var(--txt); }
/* Pool list */
.task-pool {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 3px 14px 4px;
}
/* pool category group header */
.pool-group-hdr {
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--txt3);
  padding: 7px 0 3px;
  flex-shrink: 0;
}
.trash-zone {
  flex-shrink: 0;
  margin: 6px 14px 8px;
  padding: 9px;
  text-align: center;
  border: 2px dashed var(--border2);
  border-radius: 8px;
  color: var(--txt3);
  font-size: .75rem;
  transition: all .2s;
  cursor: default;
}
.trash-zone.drag-over { border-color: var(--blue); background: #eff6ff; color: var(--blue); }
/* Edit-mode action bar */
.edit-actions-bar {
  flex-shrink: 0;
  display: none;
  gap: 6px;
  padding: 0 14px 10px;
}
.sidebar.is-editing .edit-actions-bar { display: flex; }
.eb-btn {
  flex: 1;
  padding: 7px 6px;
  border-radius: 6px;
  font-family: var(--font);
  font-size: .78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  border: 1.5px solid var(--border);
  background: var(--surf2);
  color: var(--txt2);
}
.eb-btn:hover { border-color: var(--border2); color: var(--txt); }
.eb-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.eb-btn.primary:hover { background: var(--blue2); }

/* ━━━━━━━━━━  TASK CARDS  ━━━━━━━━━━ */
/* Pool cards — slim single row */
.task-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: 6px;
  height: 26px;
  padding: 0 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: grab;
  transition: box-shadow .12s, transform .12s;
  user-select: none;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.task-card:active { cursor: grabbing; }
.task-card.dragging {
  box-shadow: 0 10px 24px rgba(30,41,59,.18), 0 3px 6px rgba(30,41,59,.1);
  transform: scale(1.06) rotate(1deg);
  z-index: 999;
}
.task-card:hover:not(.dragging) { box-shadow: 0 2px 8px rgba(30,41,59,.09); transform: translateY(-1px); }

/* Edit-mode action buttons on pool cards */
.card-edit-btns {
  display: none;
  gap: 1px;
  flex-shrink: 0;
  margin-left: auto;
}
.sidebar.is-editing .task-card .card-edit-btns { display: flex; }
.card-btn {
  background: transparent;
  border: none;
  color: var(--txt3);
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 3px;
  font-size: .75rem;
  line-height: 1;
  transition: all .1s;
}
.card-btn:hover { color: var(--txt); background: var(--border); }
.card-btn.del:hover { color: var(--red); background: #fff1f2; }

/* Calendar cards */
.task-card.c-card {
  height: 16px;
  padding: 0 4px;
  border-radius: 3px;
  border-left-width: 2px;
  margin-bottom: 1px;
  box-shadow: none;
  cursor: pointer;
  flex-shrink: 0;
}
.task-card.c-card .task-name { font-size: .65rem; }
.task-card.c-card:hover { transform: none; box-shadow: none; filter: brightness(.97); }
.task-card.c-card.dragging { transform: scale(1.08) rotate(1.5deg); z-index: 999; box-shadow: 0 6px 16px rgba(30,41,59,.2); cursor: grabbing; }

.task-card[data-status="completed"] { border-left-color: var(--green); opacity: .65; }
.task-card[data-status="completed"] .task-name { text-decoration: line-through; color: var(--txt2); }
.task-card.overdue { border-left-color: var(--red); animation: pulse 2.5s infinite; }

.task-name {
  font-size: .78rem;
  font-weight: 500;
  color: var(--txt);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
}
.task-cat-tag {
  font-size: .65rem;
  color: var(--txt2);
  background: var(--surf2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1px 6px;
  flex-shrink: 0;
  white-space: nowrap;
}

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 rgba(239,68,68,.25); }
  70%  { box-shadow: 0 0 0 5px rgba(239,68,68,0); }
  100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
}

/* ━━━━━━━━━━  CALENDAR  ━━━━━━━━━━ */
.calendar-area {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding: 8px 10px 8px;
  background: var(--bg);
  overflow: hidden;
}
.cal-header {
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.month-nav { display: flex; align-items: center; gap: 12px; }
.month-nav h1 { font-size: 1.25rem; font-weight: 600; min-width: 140px; text-align: center; color: var(--txt2); }
.nav-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--txt2);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: .95rem;
  transition: all .15s;
}
.nav-btn:hover { background: var(--surf2); border-color: var(--border2); color: var(--txt); }
.today-nav-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--txt2);
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font);
  font-size: .82rem;
  transition: all .15s;
}
.today-nav-btn:hover { background: var(--surf2); border-color: var(--border2); color: var(--txt); }

.weekdays {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  margin-bottom: 5px;
  flex-shrink: 0;
  gap: 4px;
}
.wd-col {
  text-align: center;
  font-size: .72rem;
  font-weight: 600;
  color: var(--txt3);
  letter-spacing: .4px;
  padding: 2px 0;
}

.days-grid {
  flex: 1;
  min-height: 0;
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 3px;
  overflow: hidden;
}

.day-cell {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 3px;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  transition: border-color .15s, background .15s;
  cursor: default;
}
/* Slim scrollbar for day cell */
.day-cell::-webkit-scrollbar { width: 2px; }
.day-cell::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
/* Weekend colouring */
.day-cell.is-sat { background: var(--surf-sat); border-color: var(--bdr-sat); }
.day-cell.is-sun { background: var(--surf-sun); border-color: var(--bdr-sun); }
.day-cell.is-sat .day-num { color: #9333ea; }
.day-cell.is-sun .day-num { color: #ea580c; }
.day-cell.other-month { opacity: .4; }
.day-cell.drag-over { background: #eff6ff !important; border-color: var(--blue) !important; }
.day-cell.is-today { border-color: var(--blue) !important; box-shadow: 0 0 0 1px var(--blue); }

.day-num {
  font-size: .72rem;
  font-weight: 600;
  color: var(--txt2);
  align-self: flex-end;
  width: 18px; height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  flex-shrink: 0;
  margin-bottom: 1px;
}
.day-num.today-num {
  background: var(--blue);
  color: #fff;
  box-shadow: 0 1px 6px rgba(59,130,246,.35);
}

.more-chip {
  font-size: .65rem;
  color: var(--txt2);
  padding: 1px 5px;
  background: var(--surf2);
  border-radius: 8px;
  flex-shrink: 0;
  align-self: flex-start;
  margin-top: 1px;
}

/* ━━━━━━━━━━  MODAL  ━━━━━━━━━━ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,.35);
  backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 400px;
  max-width: 92vw;
  padding: 24px 24px 18px;
  box-shadow: 0 20px 60px rgba(15,23,42,.18);
  transform: translateY(-14px) scale(.97);
  transition: transform .2s;
}
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 18px; color: var(--txt); }
.mfield { margin-bottom: 14px; }
.mfield label { display: block; font-size: .78rem; font-weight: 600; color: var(--txt2); margin-bottom: 5px; }
.mfield input, .mfield select {
  width: 100%;
  border: 1.5px solid var(--border);
  background: var(--surf2);
  color: var(--txt);
  padding: 9px 11px;
  border-radius: 7px;
  font-family: var(--font);
  font-size: .9rem;
  outline: none;
  transition: border-color .15s;
}
.mfield input:focus, .mfield select:focus { border-color: var(--blue); background: #fff; }
.mfield input[type="number"] { width: 100px; }
.mfield select { cursor: pointer; }
.mfoot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
.mbtn { padding: 8px 20px; border-radius: 7px; font-family: var(--font); font-size: .88rem; font-weight: 500; cursor: pointer; transition: all .15s; }
.mbtn-cancel { background: var(--surf2); border: 1.5px solid var(--border); color: var(--txt2); }
.mbtn-cancel:hover { border-color: var(--border2); color: var(--txt); }
.mbtn-save { background: var(--blue); border: none; color: #fff; }
.mbtn-save:hover { background: var(--blue2); }

/* ━━━━━━━━━━  NOTES POPOVER  ━━━━━━━━━━ */
.note-icon {
  flex-shrink: 0; width: 16px; height: 16px;
  fill: none; stroke: var(--txt3); stroke-width: 2;
  stroke-linecap: round; stroke-linejoin: round;
  cursor: pointer; transition: all .15s; margin-left: 2px;
}
.note-icon:hover { stroke: var(--blue); }
.note-icon.has-note { fill: var(--amber); stroke: var(--amber); }

.note-popover {
  position: absolute; width: 240px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  box-shadow: 0 4px 20px rgba(15,23,42,.15); padding: 12px;
  z-index: 2000; display: none; flex-direction: column; gap: 8px;
}
.note-popover.open { display: flex; animation: popIn .15s ease-out; }
@keyframes popIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
.note-popover textarea {
  width: 100%; height: 80px; resize: none; border: 1.5px solid var(--border);
  border-radius: 6px; padding: 6px 8px; font-family: var(--font); font-size: .85rem;
  color: var(--txt); background: var(--surf2); outline: none;
}
.note-popover textarea:focus { border-color: var(--blue); background: #fff; }
.note-popover .np-actions { display: flex; justify-content: flex-end; gap: 6px; }
.note-popover button {
  padding: 4px 10px; border-radius: 5px; font-size: .75rem; font-weight: 500; cursor: pointer; border: none; font-family: var(--font);
}
.np-cancel { background: var(--surf2); color: var(--txt2); }
.np-cancel:hover { background: var(--border); color: var(--txt); }
.np-save { background: var(--blue); color: #fff; }
.np-save:hover { background: var(--blue2); }

/* ━━━━━━━━━━  SIDEBAR TABS & SHIFT DATA  ━━━━━━━━━━ */
.tabs-head { display: flex; flex-direction: column; align-items: stretch; gap: 8px; }
.sidebar-tabs {
  display: flex; gap: 4px; background: var(--surf2); padding: 3px; border-radius: 8px; border: 1px solid var(--border);
}
.s-tab {
  flex: 1; padding: 6px 8px; text-align: center; font-size: .8rem; font-weight: 600; color: var(--txt2);
  border-radius: 6px; cursor: pointer; border: none; background: transparent; font-family: var(--font);
  transition: all .15s; white-space: nowrap;
}
.s-tab.active { background: #fff; color: var(--blue); box-shadow: 0 1px 3px rgba(30,41,59,.1); }

.shift-content {
  flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 10px 14px; gap: 10px;
}
.shift-date-picker { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.shift-date-picker input {
  flex: 1; padding: 6px 10px; border: 1.5px solid var(--border); border-radius: 6px;
  font-family: var(--font); font-size: .85rem; color: var(--txt); outline: none; background: var(--surf2);
}
.shift-date-picker input:focus { border-color: var(--blue); background: #fff; }

.shift-row {
  display: flex; flex-direction: row; align-items: center; gap: 8px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px; padding: 8px; cursor: grab; transition: all .15s;
}
.shift-row:active { cursor: grabbing; }
.shift-row.dragging { opacity: 0.5; transform: scale(0.98); }
.shift-row.drag-over { border-color: var(--blue); border-top-width: 3px; }
.shift-row-label { font-size: .8rem; font-weight: 600; color: var(--txt); flex-shrink: 0; min-width: 80px; }
.shift-row-divider { color: var(--txt3); font-size: .9rem; flex-shrink: 0; user-select: none; }
.shift-row-select {
  flex: 1; min-width: 0; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px;
  font-family: var(--font); font-size: .85rem; color: var(--txt); outline: none; cursor: pointer; background: var(--surf2);
}
.shift-row-select:focus { border-color: var(--blue); }

/* ━━━━━━━━━━  SCROLLBARS  ━━━━━━━━━━ */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #a0aec0; }
/* Touch action for drag and drop polyfill */
.task-card, .template-card {
  touch-action: none;
}

/* Mobile Responsive Layout */
@media (max-width: 768px) {
  .main-row {
    flex-direction: row;
    overflow-x: hidden;
  }
  .sidebar {
    width: 100px;
    padding: 0;
  }
  .sidebar-head {
    padding: 8px;

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, updateDoc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {

  authDomain: "mmcleaning-c3042.firebaseapp.com",
  projectId: "mmcleaning-c3042",

  messagingSenderId: "644522123924",

  measurementId: "G-JDH9XKNP29"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let currentDate = new Date();
const REAL_TODAY = new Date(); REAL_TODAY.setHours(0,0,0,0);
const OVERVIEW = '__all__';

let categories = [];
let taskTemplates = [];
let poolTasksByMonth = {};
let scheduledTasks   = [];
let poolAreaFilter   = OVERVIEW;
let employees = [];
let currentShiftDate = '';
let shiftUnsubscribe = null;

let SHIFT_ROLES = [
  '11AM 淋浴間', '11AM 廚房', '12PM 拆房', '10AM 早班',
  '11AM 午班', '12PM 晚班', '支援', '11AM 廁所'
];

/* ══════════════════════════════════════════════
   DB REALTIME LISTENERS
══════════════════════════════════════════════ */
onSnapshot(doc(db, "settings", "global"), (dSnap) => {
  if (dSnap.exists()) {
    const data = dSnap.data();
    if (data.categories) {
      categories = data.categories;
      renderPoolAreaTabs();
    }
    if (data.shiftRolesOrder) {
      SHIFT_ROLES = data.shiftRolesOrder;
    }
    if (data.employees) {
      employees = data.employees;
      if (currentShiftDate) renderShiftRows();
    }
  } else {
    setDoc(doc(db, "settings", "global"), { categories: ['A棟','B棟','公共區域'], employees: [], shiftRolesOrder: SHIFT_ROLES });
  }
});

onSnapshot(collection(db, "templates"), (snap) => {
  taskTemplates = [];
  snap.forEach(d => taskTemplates.push({ id: d.id, ...d.data() }));
  renderPool(); 
  renderCalendar();
});

onSnapshot(collection(db, "tasks"), (snap) => {
  poolTasksByMonth = {};
  scheduledTasks = [];
  snap.forEach(d => {
    const data = { id: d.id, ...d.data() };
    if (data.date) {
      scheduledTasks.push(data);
    } else {
      const mk = data.monthKey;
      if (!poolTasksByMonth[mk]) poolTasksByMonth[mk] = [];
      poolTasksByMonth[mk].push(data);
    }
  });
  renderTodayPanel();
  renderPool(); 
  renderCalendar();
});


/* ══════════════════════════════════════════════
   DOM REFS
══════════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const sidebar      = $('sidebar');
const taskPoolEl   = $('task-pool');
const calGrid      = $('calendar-days');
const monthLabel   = $('month-label');
const trashZone    = $('trash-zone');
const poolAreaTabs = $('pool-area-tabs');
const todayChips   = $('today-chips');
const editToggleBtn= $('edit-toggle-btn');
const addTaskBtn   = $('add-task-btn');
const addAreaBtn   = $('add-area-btn');
const copyLastBtn  = $('copy-last-btn');

const mOverlay     = $('modal-overlay');
const mTitle       = $('modal-title');
const mName        = $('m-name');
const mCount       = $('m-count');
const mCat         = $('m-cat');
const mCatWrap     = $('m-cat-wrap');
const mCancel      = $('m-cancel');
const mSave        = $('m-save');

/* ══════════════════════════════════════════════
   TODAY PANEL
══════════════════════════════════════════════ */
function renderTodayPanel() {
  const d = REAL_TODAY;
  $('today-day').textContent = d.getDate();
  $('today-mon').textContent = `${d.getMonth()+1}月`;

  const todayStr = fmtDate(d);
  const tasks = scheduledTasks.filter(t => t.date === todayStr);
  todayChips.innerHTML = '';

  if (!tasks.length) {
    todayChips.innerHTML = '<span class="today-empty">今天沒有任務</span>';
    return;
  }
  tasks.forEach(t => {
    const chip  = document.createElement('div');
    const cls   = t.status === 'completed' ? 'completed' : parseDate(t.date) < REAL_TODAY ? 'overdue' : 'pending';
    chip.className = `today-chip ${cls}`;
    chip.innerHTML = `<span>${cls==='completed'?'✓':cls==='overdue'?'⚠':'○'}</span>${t.name}`;
    chip.addEventListener('click', () => toggleStatus(t.id, t.status));
    todayChips.appendChild(chip);
  });
}

function toggleStatus(id, currentStatus) {
  const newStatus = currentStatus === 'completed' ? 'pending' : 'completed';
  updateDoc(doc(db, "tasks", id), { status: newStatus });
}

/* ══════════════════════════════════════════════
   EDIT TOGGLE
══════════════════════════════════════════════ */
let isEditing = false;
editToggleBtn.addEventListener('click', () => {
  isEditing = !isEditing;
  sidebar.classList.toggle('is-editing', isEditing);
  editToggleBtn.classList.toggle('active', isEditing);
  editToggleBtn.textContent = isEditing ? '✓ 完成' : '✎ 編輯';
  renderPool();
});

/* ══════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════ */
let _modalCb = null;

function openModal({ title, name='', count=1, showCat=true, preselCat=null, onSave }) {
  mTitle.textContent = title;
  mName.value  = name;
  mCount.value = count;
  mCatWrap.style.display = showCat ? 'block' : 'none';
  if (showCat) {
    mCat.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
    if (preselCat) mCat.value = preselCat;
  }
  _modalCb = onSave;
  mOverlay.classList.add('open');
  setTimeout(() => mName.focus(), 60);
}
function closeModal() { mOverlay.classList.remove('open'); _modalCb = null; }
mCancel.addEventListener('click', closeModal);
mOverlay.addEventListener('click', e => { if (e.target === mOverlay) closeModal(); });
mSave.addEventListener('click', () => {
  const name = mName.value.trim();
  const count = Math.max(1, parseInt(mCount.value)||1);
  const cat   = mCat.value;
  if (!name) { mName.focus(); return; }
  if (_modalCb) _modalCb({ name, count, cat });
  closeModal();
});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
mName.addEventListener('keydown', e => { if (e.key==='Enter') mSave.click(); });

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtMonth(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function parseDate(s) { const [y,m,d]=s.split('-'); return new Date(+y,+m-1,+d); }

function catOf(task) {
  if (!task.templateId) return '未分類';
  const t = taskTemplates.find(x => x.id === task.templateId);
  return t ? t.category : '未分類';
}
function getCurMonthPool() {
  const key = fmtMonth(currentDate);
  return poolTasksByMonth[key] || [];
}

/* ══════════════════════════════════════════════
   DRAG GLOBALS
══════════════════════════════════════════════ */
let dragData=null, dragSrc=null, droppedOk=false;

/* ══════════════════════════════════════════════
   POOL RENDER
══════════════════════════════════════════════ */
function renderPoolAreaTabs() {
  poolAreaTabs.innerHTML = '';
  const allBtn = makeAreaTabBtn('全部', poolAreaFilter === OVERVIEW, () => { poolAreaFilter = OVERVIEW; renderPoolAreaTabs(); renderPool(); });
  poolAreaTabs.appendChild(allBtn);
  categories.forEach(c => {
    const btn = makeAreaTabBtn(c, poolAreaFilter === c, () => { poolAreaFilter = c; renderPoolAreaTabs(); renderPool(); });
    poolAreaTabs.appendChild(btn);
  });
}

function makeAreaTabBtn(label, active, onClick) {
  const btn = document.createElement('button');
  btn.className = `area-tab${active?' active':''}`;
  btn.textContent = label;
  btn.addEventListener('click', onClick);
  return btn;
}

function renderPool() {
  taskPoolEl.innerHTML = '';
  let tasks = getCurMonthPool().slice();
  if (poolAreaFilter !== OVERVIEW) tasks = tasks.filter(t => catOf(t) === poolAreaFilter);

  // 依照首字筆畫排列 (Sorting by stroke count in Traditional Chinese)
  // localeCompare with 'zh-TW-u-co-stroke' efficiently sorts Chinese characters by strokes,
  // meaning identical items (same name) will automatically group together.
  tasks.sort((a, b) => a.name.localeCompare(b.name, 'zh-TW-u-co-stroke'));

  if (!tasks.length) {
    taskPoolEl.innerHTML = `<div style="color:var(--txt3);font-size:.78rem;text-align:center;padding:20px 0 0;line-height:1.7;">
      ${poolAreaFilter===OVERVIEW?'本月任務池是空的':'此區域無任務'}<br><span style="font-size:.72rem">請點擊右上方「✎ 編輯」加入工作</span></div>`;
    return;
  }

  if (poolAreaFilter === OVERVIEW) {
    const groups = {};
    tasks.forEach(t => {
      const c = catOf(t);
      if(!groups[c]) groups[c] = [];
      groups[c].push(t);
    });
    Object.entries(groups).forEach(([cat, items]) => {
      const hdr = document.createElement('div');
      hdr.className = 'pool-group-hdr';
      hdr.textContent = cat;
      taskPoolEl.appendChild(hdr);
      items.forEach(t => taskPoolEl.appendChild(mkTaskCard(t, 'pool', true)));
    });
  } else {
    tasks.forEach(t => taskPoolEl.appendChild(mkTaskCard(t, 'pool', false)));
  }
}

/* ══════════════════════════════════════════════
   TASK CARD FACTORY
══════════════════════════════════════════════ */
function mkTaskCard(task, src, showCat=false) {
  const card = document.createElement('div');
  card.className = `task-card${src==='calendar'?' c-card':''}${!showCat?' hide-cat':''}`;
  card.draggable = true;
  card.dataset.id = task.id;
  if (task.status) card.dataset.status = task.status;
  if (src==='calendar' && task.status!=='completed' && parseDate(task.date) < REAL_TODAY)
    card.classList.add('overdue');

  const cat = catOf(task);
  const hasNote = task.note && task.note.trim() !== '';
  const noteIconSvg = `<svg class="note-icon ${hasNote ? 'has-note' : ''}" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>`;

  if (src === 'pool') {
    const tpl = taskTemplates.find(x => x.id === task.templateId);
    card.innerHTML = `
      <div class="task-name">${task.name}</div>
      <div class="task-cat-tag">${cat}</div>
      ${noteIconSvg}
      <div class="card-edit-btns">
        <button class="card-btn" data-cedit title="編輯">✏</button>
        <button class="card-btn del" data-cdel title="移除">✕</button>
      </div>`;
    
    card.querySelector('[data-cedit]').addEventListener('click', e => {
      e.stopPropagation(); e.preventDefault();
      if (tpl) editTemplate(tpl.id);
      else openModal({ title:'編輯任務', name:task.name, count:1, showCat:true, preselCat:cat,
        onSave({name}){ 
          updateDoc(doc(db, "tasks", task.id), { name });
        }
      });
    });
    card.querySelector('[data-cdel]').addEventListener('click', e => {
      e.stopPropagation(); e.preventDefault();
      deleteDoc(doc(db, "tasks", task.id));
    });
  } else {
    card.innerHTML = `<div class="task-name">${task.name}</div>${noteIconSvg}`;
    card.addEventListener('click', (e) => {
      if(e.target.closest('.note-icon')) return;
      toggleStatus(task.id, task.status);
    });
  }

  const nIcon = card.querySelector('.note-icon');
  if (nIcon) {
    nIcon.addEventListener('click', (e) => {
      e.stopPropagation();
      if (typeof openNotePopover === 'function') openNotePopover(task, nIcon);
    });
  }

  card.addEventListener('dragstart', () => {
    dragData=task; dragSrc=src; droppedOk=false;
    setTimeout(()=>card.classList.add('dragging'),0);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    if (!droppedOk && src==='calendar') {
      // Put back to pool from calendar
      updateDoc(doc(db, "tasks", task.id), { date: null });
    }
    dragData=dragSrc=null;
    document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  });
  return card;
}

/* ══════════════════════════════════════════════
   TRASH ZONE
══════════════════════════════════════════════ */
trashZone.addEventListener('dragover', e=>{e.preventDefault();trashZone.classList.add('drag-over');});
trashZone.addEventListener('dragleave', ()=>trashZone.classList.remove('drag-over'));
trashZone.addEventListener('drop', e=>{
  e.preventDefault(); trashZone.classList.remove('drag-over');
  if (!dragData||dragSrc==='edit') return;
  droppedOk=true;
  if (dragSrc==='calendar') {
    updateDoc(doc(db, "tasks", dragData.id), { date: null });
  }
});

/* ══════════════════════════════════════════════
   CALENDAR
══════════════════════════════════════════════ */
$('prev-month').addEventListener('click',()=>{currentDate.setMonth(currentDate.getMonth()-1);renderCalendar();renderPool();});
$('next-month').addEventListener('click',()=>{currentDate.setMonth(currentDate.getMonth()+1);renderCalendar();renderPool();});
$('today-btn').addEventListener('click',()=>{currentDate=new Date();renderCalendar();renderPool();});

function renderCalendar() {
  const yr=currentDate.getFullYear(), mo=currentDate.getMonth();
  monthLabel.textContent=`${yr}年 ${mo+1}月`;
  const first=new Date(yr,mo,1), last=new Date(yr,mo+1,0);
  const dim=last.getDate(), sdow=first.getDay(), total=dim+sdow, rows=6;
  calGrid.innerHTML='';
  calGrid.style.gridTemplateRows=`repeat(${rows},1fr)`;
  const prevLast=new Date(yr,mo,0).getDate();
  for(let i=0;i<sdow;i++) calGrid.appendChild(mkDayCell(new Date(yr,mo-1,prevLast-sdow+i+1),true));
  for(let i=1;i<=dim;i++) calGrid.appendChild(mkDayCell(new Date(yr,mo,i)));
  for(let i=1;i<=rows*7-total;i++) calGrid.appendChild(mkDayCell(new Date(yr,mo+1,i),true));
}

function mkDayCell(dateObj, isOther=false) {
  const cell = document.createElement('div');
  const ds   = fmtDate(dateObj);
  const isTod = ds===fmtDate(REAL_TODAY);
  const dow = dateObj.getDay();
  const wCls = dow===0 ? ' is-sun' : dow===6 ? ' is-sat' : '';
  cell.className = `day-cell${isOther?' other-month':''}${isTod?' is-today':''}${wCls}`;
  cell.dataset.date = ds;

  const num = document.createElement('div');
  num.className = `day-num${isTod?' today-num':''}`;
  num.textContent = dateObj.getDate();
  cell.appendChild(num);

  const dayTasks = scheduledTasks
    .filter(t=>t.date===ds)
    .sort((a,b)=>(a.status==='completed'?1:0)-(b.status==='completed'?1:0));

  const MAX_VISIBLE = 5;
  dayTasks.slice(0, MAX_VISIBLE).forEach(t => cell.appendChild(mkTaskCard(t,'calendar')));
  if (dayTasks.length > MAX_VISIBLE) {
    const more = document.createElement('div');
    more.className = 'more-chip';
    more.textContent = `+${dayTasks.length-MAX_VISIBLE}`;
    cell.appendChild(more);
  }

  cell.addEventListener('dragover', e=>{e.preventDefault();cell.classList.add('drag-over');});
  cell.addEventListener('dragleave', ()=>cell.classList.remove('drag-over'));
  cell.addEventListener('drop', e=>{
    e.preventDefault(); cell.classList.remove('drag-over');
    if (!dragData||dragSrc==='edit') return;
    droppedOk=true; handleDrop(dragData,dragSrc,ds);
  });
  return cell;
}

function handleDrop(task, src, targetDate) {
  if (src==='pool') {
    updateDoc(doc(db, "tasks", task.id), { date: targetDate, status: 'pending' });
  } else if (src==='calendar') {
    updateDoc(doc(db, "tasks", task.id), { date: targetDate });
  }
}

/* ══════════════════════════════════════════════
   ADD TASK / AREA / COPY
══════════════════════════════════════════════ */
addTaskBtn.addEventListener('click', () => {
  openModal({
    title: '新增任務',
    showCat: true,
    preselCat: poolAreaFilter === OVERVIEW ? categories[0] : poolAreaFilter,
    async onSave({ name, count, cat }) {
      try {
        const maxOrd = Math.max(...taskTemplates.filter(t=>t.category===cat).map(t=>(typeof t.order === 'number' ? t.order : -1)), -1);
        const docRef = doc(collection(db, "templates"));
        await setDoc(docRef, { category:cat, name, count, order:maxOrd+1 });
        
        const batch = writeBatch(db);
        const curKey = fmtMonth(currentDate);
        for (let i=0; i<count; i++) {
          batch.set(doc(collection(db, "tasks")), { name, templateId: docRef.id, monthKey: curKey, date: null, status: 'pending' });
        }
        await batch.commit();
        
        // Ensure UI doesn't hide the new task because of area filters
        if (poolAreaFilter !== OVERVIEW && poolAreaFilter !== cat) {
            poolAreaFilter = cat;
        }
      } catch (err) {
        console.error(err);
        alert("新增任務失敗，Firestore 回報錯誤: " + err.message + "\n請確保沒有權限問題，或稍後再試。");
      }
    }
  });
});

addAreaBtn.addEventListener('click', () => {
  openModal({ title: '新增分類區域', showCat: false });
  mCount.closest('.mfield').style.display = 'none';
  const origSave = mSave.onclick;
  mSave.onclick = () => {
    const name = mName.value.trim();
    if (!name) { mName.focus(); return; }
    if (name && !categories.includes(name)) {
      const newCats = [...categories, name];
      updateDoc(doc(db, "settings", "global"), { categories: newCats });
      poolAreaFilter = name;
    }
    mCount.closest('.mfield').style.display = 'block';
    mSave.onclick = origSave;
    mName.placeholder = '例：男淋浴間清潔';
    closeModal();
  };
  mName.placeholder = '例：C棟';
});

copyLastBtn.addEventListener('click', async () => {
  const curKey = fmtMonth(currentDate);
  const prevDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
  const prevKey = fmtMonth(prevDate);
  
  const prevPool = poolTasksByMonth[prevKey] || [];
  const prevScheduled = scheduledTasks.filter(t => t.date.startsWith(prevKey));
  
  if (prevPool.length === 0 && prevScheduled.length === 0) {
    alert("上個月沒有任何任務可以複製！");
    return;
  }
  
  const toAdd = [...prevPool, ...prevScheduled];
  const batchChunks = [];
  let currentBatch = writeBatch(db);
  let opCount = 0;
  
  toAdd.forEach(t => {
    currentBatch.set(doc(collection(db, "tasks")), { 
      name: t.name, 
      templateId: t.templateId, 
      monthKey: curKey, 
      date: null, 
      status: 'pending' 
    });
    opCount++;
    if (opCount === 400) {
      batchChunks.push(currentBatch);
      currentBatch = writeBatch(db);
      opCount = 0;
    }
  });
  if (opCount > 0) batchChunks.push(currentBatch);
  
  for(let batch of batchChunks) {
    await batch.commit();
  }
  
  // Flash feedback on button
  const oldText = copyLastBtn.textContent;
  copyLastBtn.textContent = '✓ 複製完成！已追加至任務池';
  copyLastBtn.style.background = '#dcfce7';
  copyLastBtn.style.color = '#166534';
  copyLastBtn.style.borderColor = '#86efac';
  setTimeout(() => {
    copyLastBtn.textContent = oldText;
    copyLastBtn.style.background = '';
    copyLastBtn.style.color = 'var(--txt)';
    copyLastBtn.style.borderColor = '';
  }, 2000);
});

/* ══════════════════════════════════════════════
   EDIT TEMPLATE
══════════════════════════════════════════════ */
function editTemplate(id) {
  const t = taskTemplates.find(x => x.id === id);
  if (!t) return;
  openModal({
    title: '編輯任務', name: t.name, count: t.count, showCat: true, preselCat: t.category,
    async onSave({ name, count, cat }) {
      const oldCount = t.count;
      await updateDoc(doc(db, "templates", id), { name, count, category: cat });
      
      const batchChunks = [];
      let currentBatch = writeBatch(db);
      let opCount = 0;
      
      // Update all existing tasks that use this template
      const allTasksToUpdate = [];
      Object.keys(poolTasksByMonth).forEach(m => {
        poolTasksByMonth[m].forEach(p => { if (p.templateId===id) allTasksToUpdate.push(p.id); });
      });
      scheduledTasks.forEach(s => { if (s.templateId===id) allTasksToUpdate.push(s.id); });
      
      allTasksToUpdate.forEach(tid => {
        currentBatch.update(doc(db, "tasks", tid), { name });
        opCount++;
        if(opCount === 400) { batchChunks.push(currentBatch); currentBatch = writeBatch(db); opCount = 0; }
      });
      
      // If count increased, add extra tasks to CURRENT month's pool
      if (count > oldCount) {
        const curKey = fmtMonth(currentDate);
        for (let i=0; i<count-oldCount; i++) {
          currentBatch.set(doc(collection(db, "tasks")), { name, templateId: id, monthKey: curKey, date: null, status: 'pending' });
          opCount++;
          if(opCount === 400) { batchChunks.push(currentBatch); currentBatch = writeBatch(db); opCount = 0; }
        }
      }
      
      if(opCount > 0) batchChunks.push(currentBatch);
      for(let batch of batchChunks) await batch.commit();
    }
  });
}

/* ══════════════════════════════════════════════
   NOTE POPOVER LOGIC
══════════════════════════════════════════════ */
const npPopover = $('note-popover');
const npText = $('np-text');
let currentNoteTaskId = null;

function openNotePopover(task, iconEl) {
  currentNoteTaskId = task.id;
  npText.value = task.note || '';
  
  const rect = iconEl.getBoundingClientRect();
  npPopover.style.left = `${rect.right + 10}px`;
  npPopover.style.top = `${rect.top}px`;
  
  // Adjust if it goes offscreen
  npPopover.classList.add('open');
  const popRect = npPopover.getBoundingClientRect();
  if (popRect.right > window.innerWidth) {
    npPopover.style.left = `${rect.left - popRect.width - 10}px`;
  }
  if (popRect.bottom > window.innerHeight) {
    npPopover.style.top = `${window.innerHeight - popRect.height - 10}px`;
  }
  npText.focus();
}

$('np-cancel').addEventListener('click', () => {
  npPopover.classList.remove('open');
  currentNoteTaskId = null;
});

$('np-save').addEventListener('click', () => {
  if (currentNoteTaskId) {
    updateDoc(doc(db, "tasks", currentNoteTaskId), { note: npText.value });
  }
  npPopover.classList.remove('open');
  currentNoteTaskId = null;
});

// Close popover when clicking outside
document.addEventListener('click', (e) => {
  if (npPopover.classList.contains('open') && !npPopover.contains(e.target) && !e.target.closest('.note-icon')) {
    npPopover.classList.remove('open');
  }
});

/* ══════════════════════════════════════════════
   SIDEBAR TABS & SHIFT DATA LOGIC
══════════════════════════════════════════════ */
const tabContentPool = $('tab-content-pool');
const tabContentShift = $('tab-content-shift');
const sTabs = document.querySelectorAll('.s-tab');
const shiftDatePicker = $('shift-date');
const shiftRowsContainer = $('shift-rows-container');

let currentShiftData = {};

sTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    sTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    if (target === 'pool') {
      tabContentPool.style.display = 'flex';
      tabContentShift.style.display = 'none';
      editToggleBtn.style.display = 'block';
    } else {
      tabContentPool.style.display = 'none';
      tabContentShift.style.display = 'flex';
      editToggleBtn.style.display = 'none';
      if (!currentShiftDate) {
        currentShiftDate = fmtDate(REAL_TODAY);
        shiftDatePicker.value = currentShiftDate;
        loadShiftData(currentShiftDate);
      }
    }
  });
});

shiftDatePicker.addEventListener('change', (e) => {
  if (e.target.value) {
    currentShiftDate = e.target.value;
    loadShiftData(currentShiftDate);
  }
});

function loadShiftData(dateStr) {
  if (shiftUnsubscribe) shiftUnsubscribe();
  shiftUnsubscribe = onSnapshot(doc(db, "shifts", dateStr), (dSnap) => {
    if (dSnap.exists()) {
      currentShiftData = dSnap.data();
    } else {
      currentShiftData = {};
    }
    renderShiftRows();
  });
}

function renderShiftRows() {
  shiftRowsContainer.innerHTML = '';
  SHIFT_ROLES.forEach(role => {
    const row = document.createElement('div');
    row.className = 'shift-row';
    row.draggable = true;
    row.dataset.role = role;
    
    const lbl = document.createElement('div');
    lbl.className = 'shift-row-label';
    lbl.textContent = role;
    
    const divi = document.createElement('div');
    divi.className = 'shift-row-divider';
    divi.textContent = '|';
    
    const sel = document.createElement('select');
    sel.className = 'shift-row-select';
    sel.innerHTML = `<option value="">-- 選擇員工 --</option>`;
    employees.forEach(emp => {
      sel.innerHTML += `<option value="${emp}">${emp}</option>`;
    });
    sel.innerHTML += `<option value="__add__">＋ 新增員工</option>`;
    
    if (currentShiftData[role]) {
      sel.value = currentShiftData[role];
    }
    
    sel.addEventListener('change', (e) => {
      if (e.target.value === '__add__') {
        sel.value = currentShiftData[role] || ''; // Revert temp
        const newEmp = prompt('請輸入新員工姓名：');
        if (newEmp && newEmp.trim() && !employees.includes(newEmp.trim())) {
          const newEmps = [...employees, newEmp.trim()];
          updateDoc(doc(db, "settings", "global"), { employees: newEmps }).then(() => {
            updateShiftRole(role, newEmp.trim());
          });
        }
      } else {
        updateShiftRole(role, e.target.value);
      }
    });
    
    row.appendChild(lbl);
    row.appendChild(divi);
    row.appendChild(sel);
    shiftRowsContainer.appendChild(row);

    // Drag-and-drop functionality for reordering
    row.addEventListener('dragstart', (e) => {
      dragSrc = 'shift-row';
      setTimeout(() => row.classList.add('dragging'), 0);
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      document.querySelectorAll('.shift-row').forEach(r => r.classList.remove('drag-over'));
      dragSrc = null;
    });
    row.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (dragSrc !== 'shift-row') return;
      const dragging = shiftRowsContainer.querySelector('.dragging');
      if (dragging && dragging !== row) {
        row.classList.add('drag-over');
        const rect = row.getBoundingClientRect();
        const offset = e.clientY - rect.top - rect.height / 2;
        if (offset < 0) {
          shiftRowsContainer.insertBefore(dragging, row);
        } else {
          shiftRowsContainer.insertBefore(dragging, row.nextSibling);
        }
      }
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      if (dragSrc !== 'shift-row') return;
      row.classList.remove('drag-over');
      
      const newOrder = Array.from(shiftRowsContainer.children).map(r => r.dataset.role);
      SHIFT_ROLES = newOrder;
      updateDoc(doc(db, "settings", "global"), { shiftRolesOrder: newOrder });
    });
  });
}

function updateShiftRole(role, empName) {
  if (!currentShiftDate) return;
  const docRef = doc(db, "shifts", currentShiftDate);
  const updateData = {};
  updateData[role] = empName;
  
  setDoc(docRef, updateData, { merge: true }).catch(err => {
    console.error("更新班表失敗:", err);
  });
}
</script>
